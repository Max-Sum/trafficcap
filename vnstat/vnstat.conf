# vnStat 2.13 minimal config (ens17, billed month rotates on day 11)
#
# Note:
# - Update Interface/MonthRotate as needed.
# - Retention is minimized to keep the SQLite DB small.

# --- Common ---
Interface "ens17"
DatabaseDir "/var/lib/vnstat"
Locale "-"
UnitMode 0
UseUTC 0

# --- vnstatd ---
AlwaysAddNewInterfaces 0
TrafficlessEntries 0

# Keep DB tiny: disable 5min/hour/day resolutions
5MinuteHours   0
HourlyDays     0
DailyDays      0

# Keep only last 3 monthly entries
MonthlyMonths  3

# Disable yearly + top days
YearlyYears    0
TopDayEntries  0

# Billing cycle day-of-month
MonthRotate 11
MonthRotateAffectsYears 0

# Update/save cadence
UpdateInterval 30
PollInterval 5
SaveInterval 5
OfflineSaveInterval 30

# Keep DB compact
VacuumOnStartup 1
VacuumOnHUPSignal 1

# Avoid log growth
UseLogging 0

# SQLite knobs
DatabaseWriteAheadLogging 0
DatabaseSynchronous -1

# Safety defaults
CreateDirs 1
CheckDiskSpace 1
64bitInterfaceCounters -2
